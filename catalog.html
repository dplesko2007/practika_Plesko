<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Каталог занятий — Кружки Волжского</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="css/style.css">
    </head>
    <body>

        <nav class="nav">
            <div class="container nav__inner">
                <a href="index.html" class="nav__logo">Кружки<span>Волжского</span></a>
                <div class="nav__links">
                    <a href="catalog.html" class="active">Каталог</a>
                    <a href="about.html">О проекте</a>
                    <a href="add.html" class="nav__cta">+ Добавить занятие</a>
                </div>
            </div>
        </nav>

        <div style="background:var(--surface);border-bottom:1px solid rgba(26,26,46,0.08);padding:20px 0">
            <div class="container">
                <h1 style="font-size:1.6rem;margin-bottom:4px">Каталог занятий</h1>
                <p style="font-size:0.88rem">Кружки, секции, курсы и студии Волжского</p>
            </div>
        </div>

        <div class="container section--sm">
            <div class="catalog-search">
                <input type="text" id="catalogSearch" placeholder=" Поиск по названию, категории...">
                <button class="btn--search" onclick="document.getElementById('catalogSearch').dispatchEvent(new Event('input'))">Найти</button>
            </div>
            <div class="catalog-layout">

                <aside class="filters-panel">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
                    <h3 style="margin:0">Фильтры</h3>
                    <button class="filter-reset">Сбросить</button>
                    </div>

                    <div class="filter-group">
                    <span class="filter-group__label">Категория</span>
                    <div id="catFilterList"></div>
                    </div>

                    <div class="filter-group">
                        <span class="filter-group__label">Стоимость</span>
                        <label class="filter-option">
                            <input type="checkbox" id="freeCheck"> <svg xmlns="http://www.w3.org/2000/svg" fill="none" width="24" height="24" stroke-width="1.5" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12Z" />
                            </svg> Только бесплатные
                        </label>
                    </div>

                    <div class="filter-group">
                        <span class="filter-group__label">Район</span>
                        <div id="distFilterList"></div>
                    </div>
                </aside>

                <div>
                    <div class="catalog-top">
                        <span id="resultCount" class="catalog-top__count"></span>
                        <select class="sort-select" id="sortSelect">
                        <option value="rating">По рейтингу</option>
                        <option value="price_asc">Сначала дешевле</option>
                        <option value="price_desc">Сначала дороже</option>
                        </select>
                    </div>
                    <div id="activeFilters" class="active-filters"></div>
                    <div class="cards-grid" id="catalogGrid"></div>
                </div>
            </div>
        </div>

        <footer class="footer">
        <div class="container">
        <div class="footer__bottom">© 2026 Кружки Волжского — демонстрационный прототип</div>
        </div>
        </footer>

        <script src="js/data.js"></script>
        <script src="js/main.js"></script>
        <script src="js/catalog.js"></script>
    </body>
</html>
