<!DOCTYPE html>
<html lang="ru">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Занятие — Кружки Волжского</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    </head>
    <body>

        <nav class="nav">
            <div class="container nav__inner">
                <a href="index.html" class="nav__logo">Кружки<span>Волжского</span></a>
                <div class="nav__links">
                    <a href="catalog.html">Каталог</a>
                    <a href="about.html">О проекте</a>
                    <a href="add.html" class="nav__cta">+ Добавить занятие</a>
                </div>
            </div>
        </nav>

        <div class="activity-hero" id="activityHero"></div>
        <div id="activityContent"></div>

        <div class="modal-overlay" id="enrollModal" onclick="if(event.target===this)closeModal()">
            <div class="modal">
                <button class="modal__close" onclick="closeModal()">×</button>
                <h2 id="modalTitle">Записаться</h2>
                <p>Оставьте контакты — организатор свяжется с вами в течение дня.</p>
                <div class="form-group">
                    <label>Ваше имя *</label>
                    <input type="text" id="enrollName" placeholder="Иван Иванов">
                </div>
                <div class="form-group">
                    <label>Телефон *</label>
                    <input type="tel" id="enrollPhone" placeholder="+7 (___) ___-__-__">
                </div>
                <div class="form-group">
                    <label>Комментарий</label>
                    <textarea placeholder="Возраст ребёнка, вопросы..." rows="3"></textarea>
                </div>
                <button class="btn btn--primary btn--full" onclick="submitEnroll()">Отправить заявку</button>
            </div>
        </div>

        <footer class="footer">
            <div class="container">
                <div class="footer__bottom">© 2026 Кружки Волжского — демонстрационный прототип</div>
            </div>
        </footer>
        
        <script src="js/data.js"></script>
        <script src="js/main.js"></script>
        <script src="js/activity.js"></script>
    </body>
</html>
